name: CI Pokedex SkyNexUI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' 

    - name: Instalando dependências (yarn install)
      run: yarn install

    - name: Construindo o projeto web (yarn build:web)
      run: yarn build:web
